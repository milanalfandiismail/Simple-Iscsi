[server]
  address        = "0.0.0.0"
  port           = 3300
  read_cache_gb  = 2

[dhcp]
  enabled        = false
  start_ip       = "192.168.137.100"
  end_ip         = "192.168.137.200"
  subnet_mask    = "255.255.255.0"
  router         = "192.168.137.1"
  dns            = "8.8.8.8"
  next_server    = "192.168.137.1"
  tftp_dir       = "pxe"
  pxe_default    = "sb-custom"

[gamedisk_target]
  target_iqn     = "iqn.2024-01.com.tmdebug:gamedisks"
  discovery      = true

# [[gamedisk]]
