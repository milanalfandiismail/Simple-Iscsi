[server]
address = "10.10.10.25"
port = 3300

[dhcp]
enabled = true
start_ip = "10.10.10.100"
end_ip = "10.10.10.200"
subnet_mask = "255.255.255.0"
router = "10.10.10.1"
dns = "8.8.8.8"
next_server = "10.10.10.1"
