[windows]
  target_iqn_prefix   = "iqn.2024-01.com.tmdebug:vhd-"
  vhd_dir             = 'C:\vhd'
  block_size          = 512
  vendor_id           = "RUSTISCS"
  product_id          = "WindowsBoot"
  product_revision    = "1.00"
  discovery           = false
  super_client_ip     = ""
  super_client_action = "none"

[writeback]
  writeback_dirs          = ['C:\writeback']
  max_cache_per_client_gb = 10
  max_write_speed_mbps    = 20

