Each line is a full path to a file or folder, the files or folders in the list will be prohibited from being transferred to the personal disk, and all others will be transferred=كل سطر هو مسار كامل لملف أو مجلد، سيتم منع نقل الملفات أو المجلدات الموجودة في القائمة إلى القرص الشخصي، وسيتم نقل جميع الملفات الأخرى
Each line is a full path to a file or folder, only the files or folders in the list will be transferred to the personal disk, and all others will not be transferred. At the same time, the blacklist does not work.=كل سطر هو مسار كامل لملف أو مجلد، سيتم نقل الملفات أو المجلدات الموجودة في القائمة فقط إلى القرص الشخصي، ولن يتم نقل جميع الملفات الأخرى. في نفس الوقت، لا تعمل القائمة السوداء.
Each line is a registry path, the registry in the list will be prohibited from being transferred to the personal disk, and all others will be transferred=كل سطر هو مسار تسجيل، سيتم منع نقل التسجيل الموجود في القائمة إلى القرص الشخصي، وسيتم نقل جميع التسجيلات الأخرى
Each line is a registry path, only the registry in the list will be transferred to the personal disk, and all others will not be transferred. At the same time, the blacklist does not work.=كل سطر هو مسار تسجيل، سيتم نقل التسجيل الموجود في القائمة فقط إلى القرص الشخصي، ولن يتم نقل جميع التسجيلات الأخرى. في نفس الوقت، لا تعمل القائمة السوداء.
